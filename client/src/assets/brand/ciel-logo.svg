<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" role="img" aria-label="Ciel logo lockup">
  <title>Ciel — logo lockup</title>
  <desc>The Ciel logomark beside the Ciel wordmark set in a warm serif.</desc>
  <!-- mark -->
  <g transform="translate(8,10) scale(1.0)">
    <path d="M75.3,28.8 A33,33 0 1,0 75.3,71.2" fill="none" stroke="#2456C8" stroke-width="13" stroke-linecap="round"/>
    <line x1="28" y1="56" x2="60" y2="56" stroke="#2456C8" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
    <path d="M37,56 A11,11 0 0,1 59,56 Z" fill="#F2B450"/>
  </g>
  <!-- wordmark -->
  <text x="132" y="78" font-family="'Fraunces','Georgia',serif" font-size="66" font-weight="600" fill="#0B1533" letter-spacing="-1">Ciel</text>
  <!-- pronunciation + descriptor -->
  <text x="134" y="100" font-family="'Public Sans','Helvetica Neue',Arial,sans-serif" font-size="12.5" letter-spacing="3" fill="#5A6685">SI-YEL · IMPACT OS</text>
</svg>
