<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Ciel product application board">
  <title>Ciel — Product Application</title>
  <desc>The Ciel app in its brand system: a Theory-of-Change studio with grounded provenance chips and a live scale/adapt/stop signal in the right rail.</desc>
  <defs>
    <g id="mark">
      <path d="M75.3,28.8 A33,33 0 1,0 75.3,71.2" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round"/>
      <line x1="28" y1="56" x2="60" y2="56" stroke="currentColor" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
      <path d="M37,56 A11,11 0 0,1 59,56 Z" fill="#F2B450"/>
    </g>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9FB0D6"/></marker>
  </defs>

  <rect width="1280" height="800" fill="#F6F8FC"/>

  <!-- header -->
  <g font-family="'Public Sans','Helvetica Neue',Arial,sans-serif">
    <text x="48" y="62" font-family="'Fraunces','Georgia',serif" font-size="26" font-weight="600" fill="#0B1533">Ciel</text>
    <text x="120" y="62" font-size="12" letter-spacing="3" fill="#5A6685">PRODUCT APPLICATION</text>
    <text x="1232" y="62" text-anchor="end" font-size="12" letter-spacing="3" fill="#5A6685">03</text>
  </g>
  <line x1="48" y1="86" x2="1232" y2="86" stroke="#E3E8F2"/>

  <!-- ===== browser card ===== -->
  <rect x="48" y="112" width="1184" height="656" rx="16" fill="#FFFFFF" stroke="#E3E8F2"/>
  <!-- chrome -->
  <path d="M48,128 a16,16 0 0,1 16,-16 h1152 a16,16 0 0,1 16,16 v32 h-1184 z" fill="#EEF1F7"/>
  <circle cx="78" cy="144" r="5" fill="#D5443C"/><circle cx="98" cy="144" r="5" fill="#E0922F"/><circle cx="118" cy="144" r="5" fill="#2E9E6B"/>
  <rect x="360" y="132" width="560" height="24" rx="12" fill="#FFFFFF" stroke="#E3E8F2"/>
  <text x="640" y="148" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="11.5" fill="#5A6685">app.ciel.org/projects/cebu-youth-jobs</text>

  <!-- ===== sidebar ===== -->
  <path d="M48,160 h196 v592 a16,16 0 0,1 -16,16 h-164 a16,16 0 0,1 -16,-16 z" fill="#0B1533"/>
  <g transform="translate(66,178) scale(0.30)" color="#EAF0FF"><use href="#mark"/></g>
  <text x="104" y="196" font-family="'Fraunces','Georgia',serif" font-size="18" font-weight="600" fill="#EAF0FF">Ciel</text>
  <g font-family="'Public Sans',sans-serif" font-size="13.5">
    <text x="72" y="252" fill="#9FB0D6">Dashboard</text>
    <rect x="56" y="276" width="180" height="30" rx="8" fill="#13224C"/>
    <text x="72" y="296" fill="#F2B450">ToC Studio</text>
    <text x="72" y="338" fill="#9FB0D6">Grants</text>
    <text x="72" y="380" fill="#9FB0D6">Field Data</text>
    <text x="72" y="422" fill="#9FB0D6">Reports</text>
  </g>
  <text x="72" y="724" font-family="'Public Sans',sans-serif" font-size="11" fill="#5A6685">Maria · Program Lead</text>

  <!-- ===== main content ===== -->
  <!-- title row -->
  <text x="276" y="206" font-family="'Fraunces','Georgia',serif" font-size="26" font-weight="600" fill="#0B1533">Cebu Youth Jobs</text>
  <text x="276" y="230" font-family="'Public Sans',sans-serif" font-size="12.5" fill="#5A6685">Theory of Change · v1 · Locked · grounded in 11 sources</text>
  <rect x="1040" y="186" width="168" height="36" rx="18" fill="#2456C8"/>
  <text x="1124" y="209" text-anchor="middle" font-family="'Public Sans',sans-serif" font-size="13" fill="#FFFFFF">Generate proposal</text>

  <!-- ToC vertical flow -->
  <g font-family="'Public Sans',sans-serif">
    <!-- node template repeated -->
    <!-- 1 Problem -->
    <rect x="300" y="262" width="380" height="70" rx="12" fill="#F6F8FC" stroke="#E3E8F2"/>
    <text x="320" y="286" font-size="11" letter-spacing="2" fill="#5A6685">PROBLEM</text>
    <text x="320" y="312" font-size="14.5" fill="#0B1533">Youth unemployment, rural Cebu</text>
    <rect x="560" y="296" width="100" height="22" rx="11" fill="#E7EEFB"/><text x="574" y="311" font-size="10.5" fill="#2456C8">◆ 3 sources</text>
    <!-- 2 Activities -->
    <rect x="300" y="356" width="380" height="70" rx="12" fill="#F6F8FC" stroke="#E3E8F2"/>
    <text x="320" y="380" font-size="11" letter-spacing="2" fill="#5A6685">ACTIVITIES</text>
    <text x="320" y="406" font-size="14.5" fill="#0B1533">Skills training + employer matching</text>
    <rect x="560" y="390" width="100" height="22" rx="11" fill="#E7EEFB"/><text x="574" y="405" font-size="10.5" fill="#2456C8">◆ 4 sources</text>
    <!-- 3 Outcomes -->
    <rect x="300" y="450" width="380" height="70" rx="12" fill="#F6F8FC" stroke="#E3E8F2"/>
    <text x="320" y="474" font-size="11" letter-spacing="2" fill="#5A6685">OUTCOME</text>
    <text x="320" y="500" font-size="14.5" fill="#0B1533">Job-placement rate within 6 months</text>
    <rect x="560" y="484" width="100" height="22" rx="11" fill="#FBF0DA"/><text x="574" y="499" font-size="10.5" fill="#9A6A12">⚑ assumption</text>
    <!-- 4 Impact -->
    <rect x="300" y="544" width="380" height="70" rx="12" fill="#F6F8FC" stroke="#E3E8F2"/>
    <text x="320" y="568" font-size="11" letter-spacing="2" fill="#5A6685">IMPACT</text>
    <text x="320" y="594" font-size="14.5" fill="#0B1533">Household income lifted</text>
    <rect x="560" y="578" width="100" height="22" rx="11" fill="#E7EEFB"/><text x="574" y="593" font-size="10.5" fill="#2456C8">◆ 2 sources</text>
    <!-- connectors -->
    <g stroke="#9FB0D6" stroke-width="1.5">
      <line x1="490" y1="332" x2="490" y2="354" marker-end="url(#arr)"/>
      <line x1="490" y1="426" x2="490" y2="448" marker-end="url(#arr)"/>
      <line x1="490" y1="520" x2="490" y2="542" marker-end="url(#arr)"/>
    </g>
  </g>

  <!-- ===== right rail ===== -->
  <!-- signal card -->
  <g font-family="'Public Sans',sans-serif">
    <rect x="724" y="262" width="484" height="150" rx="12" fill="#FFFBF3" stroke="#F2D89B"/>
    <circle cx="748" cy="292" r="6" fill="#E0922F"/>
    <text x="766" y="297" font-family="'Public Sans',sans-serif" font-size="14" font-weight="600" letter-spacing="1" fill="#9A6A12">ADAPT</text>
    <text x="1188" y="297" text-anchor="end" font-size="11" fill="#9A6A12">signal · human-approved</text>
    <text x="748" y="330" font-size="13.5" fill="#0B1533">Attendance is trending below the</text>
    <text x="748" y="350" font-size="13.5" fill="#0B1533">“12 per session” assumption for 3 weeks.</text>
    <rect x="748" y="368" width="120" height="30" rx="15" fill="#0B1533"/><text x="808" y="388" text-anchor="middle" font-size="12.5" fill="#FFFFFF">Review plan</text>
    <text x="884" y="388" font-size="12" fill="#5A6685">Recommendation only — you decide.</text>
  </g>

  <!-- indicator chart -->
  <g font-family="'Public Sans',sans-serif">
    <rect x="724" y="430" width="484" height="184" rx="12" fill="#FFFFFF" stroke="#E3E8F2"/>
    <text x="748" y="462" font-size="11" letter-spacing="2" fill="#5A6685">ATTENDANCE VS ASSUMPTION</text>
    <!-- assumption horizon (gold dashed) -->
    <line x1="748" y1="520" x2="1184" y2="520" stroke="#F2B450" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="1184" y="514" text-anchor="end" font-size="10.5" fill="#9A6A12">assumption</text>
    <!-- actual (blue), dipping below late -->
    <polyline points="748,512 800,506 852,514 904,508 956,522 1008,528 1060,540 1112,548 1164,560"
      fill="none" stroke="#2456C8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1164" cy="560" r="4" fill="#2456C8"/>
    <text x="748" y="598" font-size="11.5" fill="#5A6685">Weeks 1–9 · live from field (PWA + SMS)</text>
  </g>

  <!-- footer -->
  <g font-family="'Public Sans',sans-serif">
    <text x="48" y="788" font-size="11.5" fill="#9aa6c2">Calm civic editorial · grounded AI · human-in-the-loop</text>
    <text x="1232" y="788" text-anchor="end" font-size="11.5" letter-spacing="2" fill="#9aa6c2">03 — APPLICATION</text>
  </g>
</svg>
